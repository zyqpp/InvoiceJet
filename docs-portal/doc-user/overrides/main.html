{% extends "base.html" %}

{% block styles %}
{{ super() }}
<style>
/* Ukryj domyślne zakładki Material */
.md-tabs { display: none !important; }
/* Ten sam styl co doc-ai */
.ij-cat-bar { background: #3f51b5; display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 16px; align-items: center; }
.ij-cat-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none !important; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); transition: all 0.15s; white-space: nowrap; }
.ij-cat-btn:hover { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.5); }
.ij-cat-btn.active { background: #fff; color: #3f51b5; font-weight: 700; border-color: #fff; }
.ij-portal-switch { display: flex; gap: 4px; margin-left: 8px; }
.ij-portal-btn { padding: 3px 10px; border-radius: 14px; font-size: 0.72rem; font-weight: 600; text-decoration: none !important; border: 1.5px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); transition: all 0.15s; }
.ij-portal-btn:hover { border-color: #fff; color: #fff; }
.ij-portal-btn.current { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); }
.md-sidebar--primary { width: 270px; }
.md-content { max-width: 880px; }
.md-nav__link--active { color: #3f51b5 !important; font-weight: 600; }
.md-typeset table th { background: #3f51b5; color: #fff; }
.md-typeset table tr:hover { background: #f1f5f9; }
.md-typeset code { background: #f1f5f9 !important; color: #0f172a !important; border-radius: 4px; padding: 1px 5px; }
</style>
{% endblock %}

{% block tabs %}
<div class="ij-cat-bar" role="navigation" aria-label="Sekcje dokumentacji">
  <a href="/" class="ij-cat-btn" data-cat="">🏠 Strona główna</a>
  <a href="/01_ekrany/index.html" class="ij-cat-btn" data-cat="01_ekrany">🖥️ Opisy ekranów</a>
  <a href="/02_procesy/index.html" class="ij-cat-btn" data-cat="02_procesy">▶️ Instrukcje procesów</a>
  <a href="/zrodla.html" class="ij-cat-btn" data-cat="zrodla">📚 Źródła</a>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function() {
  function setActiveBtn() {
    var path = window.location.pathname;
    document.querySelectorAll(".ij-cat-btn[data-cat]").forEach(function(btn) {
      var cat = btn.getAttribute("data-cat");
      var active = cat === ""
        ? !["01_ekrany","02_procesy","zrodla"].some(function(c){ return path.indexOf("/"+c)!==-1; })
        : path.indexOf("/"+cat)!==-1;
      btn.classList.toggle("active", active);
    });
  }
  setActiveBtn();

  function addPortalSwitch() {
    if (document.getElementById("ij-portal-sw")) return;
    var sw = document.createElement("div");
    sw.id = "ij-portal-sw";
    sw.className = "ij-portal-switch";
    sw.innerHTML = '<a href="http://127.0.0.1:8001/" class="ij-portal-btn" title="Dokumentacja Techniczna">📚 Techniczna</a>'
      + '<a href="http://127.0.0.1:8002/" class="ij-portal-btn current" title="Dokumentacja Użytkownika">👤 Użytkownik</a>';
    var header = document.querySelector(".md-header__inner");
    if (header) header.appendChild(sw);
  }
  document.addEventListener("DOMContentLoaded", addPortalSwitch);

  if (typeof document$ !== "undefined") {
    document$.subscribe(function() { setActiveBtn(); addPortalSwitch(); });
  }
})();
</script>
{% endblock %}
