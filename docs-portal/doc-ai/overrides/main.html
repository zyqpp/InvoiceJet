{% extends "base.html" %}

{% block styles %}
  {{ super() }}
  <style>
/* ── Panel kategorii ── */
.nav-categories { padding:6px 6px 8px 6px; border-bottom:1px solid var(--md-default-fg-color--lightest); margin-bottom:4px; }
.nav-categories__title { font-size:.63rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--md-default-fg-color--light); padding:2px 4px 5px 4px; display:block; }
.nav-cat-btn { display:flex; align-items:center; gap:7px; padding:5px 8px; border-radius:5px; font-size:.76rem; font-weight:500; color:var(--md-default-fg-color); text-decoration:none!important; transition:background .12s,color .12s; line-height:1.3; }
.nav-cat-btn:hover { background:rgba(63,81,181,.08); color:#3f51b5; }
.nav-cat-btn.active { background:#3f51b5!important; color:#fff!important; font-weight:600; }
.nav-cat-btn .cat-icon { font-size:.9rem; flex-shrink:0; width:16px; text-align:center; }
.nav-cat-btn .cat-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* ── Przełącznik portali ── */
.portal-switch { display:flex; gap:4px; padding:8px 6px 6px 6px; }
.portal-switch a { flex:1; text-align:center; padding:4px 6px; border-radius:5px; font-size:.7rem; font-weight:600; text-decoration:none!important; border:1.5px solid var(--md-default-fg-color--lightest); color:var(--md-default-fg-color--light); transition:all .12s; }
.portal-switch a:hover { border-color:#3f51b5; color:#3f51b5; }
.portal-switch a.current { background:#3f51b5; color:#fff; border-color:#3f51b5; }
/* ── Sidebar + tree ── */
.md-sidebar--primary { width:290px; }
.md-content { max-width:960px; }
.md-nav__link--active { color:#3f51b5!important; font-weight:600; }
.md-nav__item--section > .md-nav__link { font-weight:700; font-size:.75rem; letter-spacing:.05em; text-transform:uppercase; color:var(--md-default-fg-color--light); padding-top:10px; }
/* ── Tabele i kod ── */
.md-typeset table th { background:#3f51b5; color:#fff; }
.md-typeset table tr:hover { background:#f1f5f9; }
.md-typeset code { background:#f1f5f9!important; color:#0f172a!important; border-radius:4px; padding:1px 5px; }
  </style>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
(function() {
  var CATS = [
    { id:"",                     icon:"🏠", label:"doc_AI — Strona główna",       path:"/" },
    { id:"00_meta",              icon:"📋", label:"00_meta — Metadokumenty",      path:"/00_meta/index.html" },
    { id:"01_ekrany",            icon:"🖥️", label:"01_ekrany — Ekrany",           path:"/01_ekrany/index.html" },
    { id:"02_procesy",           icon:"⚙️", label:"02_procesy — Procesy",         path:"/02_procesy/index.html" },
    { id:"03_algorytmy",         icon:"🔧", label:"03_algorytmy",                 path:"/03_algorytmy/index.html" },
    { id:"04_api_i_integracje",  icon:"🔌", label:"04_api — API i integracje",    path:"/04_api_i_integracje/index.html" },
    { id:"05_model_danych",      icon:"🗄️", label:"05_model_danych",              path:"/05_model_danych/index.html" },
    { id:"06_role_i_uprawnienia",icon:"🔐", label:"06_role_i_uprawnienia",        path:"/06_role_i_uprawnienia/index.html" },
    { id:"07_use_case",          icon:"📐", label:"07_use_case",                  path:"/07_use_case/index.html" },
    { id:"08_model_biznesowy",   icon:"🏢", label:"08_model_biznesowy",           path:"/08_model_biznesowy/index.html" },
    { id:"09_procesy_biznesowe", icon:"🔄", label:"09_procesy_biznesowe",         path:"/09_procesy_biznesowe/index.html" },
    { id:"10_testy",             icon:"✅", label:"10_testy",                     path:"/10_testy/index.html" },
    { id:"_mapowania",           icon:"🗺️", label:"_mapowania",                   path:"/_mapowania/index.html" },
    { id:"_slowniki",            icon:"📖", label:"_slowniki",                    path:"/_slowniki/index.html" }
  ];

  function buildPanel() {
    var sidebar = document.querySelector(".md-sidebar--primary .md-sidebar__scrollwrap");
    if (!sidebar || document.getElementById("ij-nav-panel")) return;

    var path = window.location.pathname;

    // Który przycisk jest aktywny
    function isActive(cat) {
      if (!cat.id) {
        return !CATS.slice(1).some(function(c){ return path.indexOf("/"+c.id+"/")!==-1 || path.indexOf("/"+c.id+".")!==-1; });
      }
      return path.indexOf("/"+cat.id+"/")!==-1 || path.indexOf("/"+cat.id+".")!==-1;
    }

    var switchHtml = '<div class="portal-switch">'
      + '<a href="http://127.0.0.1:8001/" class="current" title="Dokumentacja Techniczna">📚 Techniczna</a>'
      + '<a href="http://127.0.0.1:8002/" title="Dokumentacja Użytkownika">👤 Użytkownik</a>'
      + '</div>';

    var items = CATS.map(function(cat){
      var active = isActive(cat) ? " active" : "";
      return '<li><a href="'+cat.path+'" class="nav-cat-btn'+active+'" title="'+cat.label+'">'
        + '<span class="cat-icon">'+cat.icon+'</span>'
        + '<span class="cat-label">'+cat.label+'</span>'
        + '</a></li>';
    }).join("");

    var panel = document.createElement("div");
    panel.id = "ij-nav-panel";
    panel.innerHTML = switchHtml
      + '<div class="nav-categories">'
      + '<span class="nav-categories__title">Kategorie</span>'
      + '<ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:1px;">'+items+'</ul>'
      + '</div>';

    sidebar.insertBefore(panel, sidebar.firstChild);
  }

  document.addEventListener("DOMContentLoaded", buildPanel);

  // MkDocs instant navigation (SPA mode)
  if (typeof document$ !== "undefined") {
    document$.subscribe(function(){
      var old = document.getElementById("ij-nav-panel");
      if (old) old.remove();
      buildPanel();
    });
  }
})();
  </script>
{% endblock %}
